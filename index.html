<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Paper Renamer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.39.0/build/stlite.css"/>
  <style>
    body { margin: 0; padding: 0; }
    #root { height: 100vh; }

    /* Hide sidebar close button */
    [data-testid="stSidebarCloseButton"] { display: none !important; }

    /* Loading screen */
    #loading-screen {
      position: fixed;
      inset: 0;
      background: #0e1117;
      z-index: 99999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      transition: opacity 0.5s ease;
    }
    #loading-screen.fade-out { opacity: 0; pointer-events: none; }

    /* Processing overlay */
    #overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(10, 12, 20, 0.80);
      backdrop-filter: blur(4px);
      z-index: 9999;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
    }
    #overlay.on { display: flex; }

    .ring {
      width: 68px; height: 68px;
      border: 5px solid rgba(99,179,237,0.15);
      border-top-color: #63b3ed;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    .ring-sm {
      width: 44px; height: 44px;
      border: 4px solid rgba(99,179,237,0.15);
      border-top-color: #63b3ed;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .msg {
      color: #e2e8f0;
      font-family: 'Courier New', monospace;
      font-size: 20px;
      letter-spacing: 0.08em;
    }
    .msg-sm {
      color: #a0aec0;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      letter-spacing: 0.06em;
    }
    .sub {
      color: #718096;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      margin-top: -16px;
    }
    .dots::after {
      content: '';
      animation: dot 1.4s steps(4,end) infinite;
    }
    @keyframes dot {
      0%  { content:'';    }
      25% { content:'.';   }
      50% { content:'..';  }
      75% { content:'...'; }
    }
  </style>
</head>
<body>

<div id="loading-screen">
  <div class="ring-sm"></div>
  <div class="msg-sm">Initializing<span class="dots"></span></div>
</div>

<div id="overlay">
  <div class="ring"></div>
  <div class="msg">Processing<span class="dots"></span></div>
  <div class="sub">Please wait — fetching metadata from Crossref (UI may freeze temporarily)</div>
</div>

<div id="root"></div>

<script>
const overlay = document.getElementById('overlay');
function showOverlay() { overlay.classList.add('on'); }
function hideOverlay() { overlay.classList.remove('on'); }

document.addEventListener('click', function(e) {
  const btn = e.target.closest('button');
  if (btn && btn.textContent.trim().toLowerCase().includes('start processing')) {
    showOverlay();
    waitForResults();
  }
}, true);

function waitForResults() {
  const observer = new MutationObserver(function() {
    const hasDownload = Array.from(document.querySelectorAll('button'))
                             .some(b => b.textContent.toLowerCase().includes('download'));
    if (hasDownload) { hideOverlay(); observer.disconnect(); }
  });
  observer.observe(document.getElementById('root'), { childList: true, subtree: true });
  setTimeout(hideOverlay, 300000);
}
</script>

<script src="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.39.0/build/stlite.js"></script>
<script>
stlite.mount({
  requirements: ["pypdf", "requests"],
  entrypoint: "app.py",
  files: {
    "app.py": `
import streamlit as st
import pypdf
import requests
import re
import io
import zipfile
import time
import random

DOI_REGEX = r"10[.][0-9]{4,9}/[-._;()/:A-Za-z0-9]+"

st.set_page_config(page_title="Paper Renamer", layout="wide")
st.markdown(
    "<style>header{visibility:hidden}footer{visibility:hidden}"
    "[data-testid=stSidebarCloseButton]{display:none!important}</style>",
    unsafe_allow_html=True
)

# ── Request cache (persists within a browser session) ──
if "doi_cache" not in st.session_state:
    st.session_state.doi_cache = {}
if "title_cache" not in st.session_state:
    st.session_state.title_cache = {}

DUMMY = {
    "Year":    "2026",
    "Author":  "Smith",
    "Title":   "Advanced Dosimetric Analysis of VMAT vs IMRT for Prostate Cancer",
    "Journal": "Int J Radiat Oncol Biol Phys"
}

def sanitize(name):
    name = name.strip()
    while ": " in name:
        name = name.replace(": ", " - ")
    name = name.replace(":", " - ").replace("/", "_").replace(chr(92), "_")
    for c in "?!\\\\'\\"\x60^~$@#%&+;={}()[],<>|*":
        name = name.replace(c, "")
    return " ".join(name.split()).strip(" .")

with st.sidebar:
    st.header("Naming Convention")
    options = ["not_use", "Year", "Author", "Title", "Journal"]
    slots = [
        st.selectbox("Slot 1", options, index=1),
        st.selectbox("Slot 2", options, index=3),
        st.selectbox("Slot 3", options, index=2),
        st.selectbox("Slot 4", options, index=4),
    ]
    st.markdown("---")
    st.subheader("Live Preview")
    parts = [DUMMY[s] for s in slots if s != "not_use"]
    stem  = sanitize("_".join(parts)) if parts else "Unknown_Paper"
    if len(stem) > 150: stem = stem[:150] + "..."
    st.info(f"📄 **{stem}.pdf**")

def parse_meta(data):
    try:
        title   = (data.get("title") or ["Unknown_Title"])[0]
        authors = data.get("author", [])
        author  = authors[0].get("family", "Unknown_Author") if authors else "Unknown_Author"
        year    = "Unknown_Year"
        for field in ["issued", "published-print", "published-online"]:
            dp = data.get(field, {}).get("date-parts", [[None]])
            if dp[0][0]: year = str(dp[0][0]); break
        journal = (data.get("container-title") or ["Unknown_Journal"])[0]
        return {"title": title, "year": year, "author": author, "journal": journal}
    except Exception:
        return None

def fetch_by_doi(doi):
    doi = re.sub(r"^https?://(dx[.])?doi[.]org/", "", doi.strip(), flags=re.IGNORECASE)
    # Try the DOI as-is, then progressively trim trailing characters on 404
    # (handles cases where regex greedily captures trailing digits/chars)
    candidate = doi
    for _ in range(6):
        if not candidate or not candidate.startswith("10.") or len(candidate) < 8:
            break
        try:
            time.sleep(0.4 + random.random() * 0.5)
            r = requests.get(f"https://api.crossref.org/works/{candidate}",
                             headers={"User-Agent": "PaperRenamer/1.0 (mailto:your-email@example.com)"}, timeout=15)
            if r.status_code == 200:
                return parse_meta(r.json().get("message", {}))
            elif r.status_code == 404:
                # Trim trailing character and retry
                candidate = candidate[:-1].rstrip(".,;:)- ")
            else:
                break
        except Exception:
            break
    return None

def extract_doi(pdf_file):
    """DOI extraction: text-based (original proven approach) + metadata + raw bytes bonus"""
    try:
        pdf_file.seek(0)
        pdf_bytes = pdf_file.read()
        pdf_file.seek(0)

        reader = pypdf.PdfReader(io.BytesIO(pdf_bytes))

        # Strategy 0: PDF metadata fields
        meta = reader.metadata or {}
        for key in ["/doi", "/DOI", "/Subject", "/Keywords", "/WPS-ARTICLEDOI"]:
            val = str(meta.get(key) or "")
            if val:
                m = re.search(DOI_REGEX, val, re.IGNORECASE)
                if m:
                    return m.group(0).rstrip(".,;:)")

        # Strategy 1: Text extraction — original proven approach
        # Use "".join (no separator) to avoid splitting DOIs across page boundaries
        text = "".join(reader.pages[i].extract_text() or "" for i in range(min(len(reader.pages), 3)))
        m = re.search(DOI_REGEX, text, re.IGNORECASE)
        if m:
            return m.group(0).rstrip(".,;:)")

        # Strategy 2: Raw PDF bytes — catches DOIs in hyperlink annotations
        raw_head = pdf_bytes[:300000].decode("latin-1", errors="ignore")
        m = re.search(r"doi[.]org/(" + DOI_REGEX + ")", raw_head, re.IGNORECASE)
        if m:
            return m.group(1).rstrip(".,;:)")

        return None
    except Exception:
        return None

def extract_title_candidate(pdf_file):
    try:
        pdf_file.seek(0)
        pdf_bytes = pdf_file.read()
        pdf_file.seek(0)
        reader = pypdf.PdfReader(io.BytesIO(pdf_bytes))
        meta   = reader.metadata or {}
        title  = (meta.get("/Title") or "").strip()
        
        # Discard unhelpful PDF metadata
        skip_meta = ["untitled", "microsoft", "doi", ".pdf", "arxiv", "template"]
        if not title or any(s in title.lower() for s in skip_meta) or len(title) < 5:
            title = ""
            
        if not title and reader.pages:
            skip_lines = [
                "cite this", "downloaded", "copyright", "rights reserved",
                "open access", "creative commons", "license", "elsevier",
                "springer", "wiley", "oxford", "published by", "received",
                "accepted", "available online", "journal homepage",
                "correspondence", "author", "e-mail", "email",
                "vol.", "volume", "page ", "pages ", "pp.", "issn",
                "www.", "http", "all rights", "peer review",
                "editorial", "dear editor", "to the editor",
                "article info", "article history", "keyword",
                "abstract", "introduction", "original",
                "review article", "research article", "case report",
            ]
            lines = [l.strip() for l in (reader.pages[0].extract_text() or "").splitlines()]
            for l in lines:
                ll = l.lower()
                if (len(l) > 15
                    and "doi" not in ll
                    and not any(s in ll for s in skip_lines)
                    and any(c.isalpha() for c in l)
                    and sum(c.isalpha() for c in l) > len(l) * 0.4):
                    title = l
                    break
                    
        return " ".join(title[:250].split()) if title else None
    except Exception: return None

def title_similarity(a, b):
    """Simple word overlap similarity between two titles"""
    if not a or not b: return 0.0
    sa = set(w.lower() for w in re.findall(r"[a-zA-Z]{3,}", a))
    sb = set(w.lower() for w in re.findall(r"[a-zA-Z]{3,}", b))
    if not sa or not sb: return 0.0
    return len(sa & sb) / max(len(sa), len(sb))

def search_by_title(title):
    if not title or len(title) < 10: return None
    try:
        time.sleep(0.4 + random.random() * 0.6)
        r = requests.get("https://api.crossref.org/works",
                         params={"query.title": title, "rows": 3},
                         headers={"User-Agent": "PaperRenamer/1.0 (mailto:test@example.com)"}, timeout=15)
        if r.status_code == 200:
            items = r.json().get("message", {}).get("items", [])
            for item in items:
                result_title = (item.get("title") or [""])[0]
                if title_similarity(title, result_title) >= 0.2:
                    return parse_meta(item)
    except Exception: pass
    return None

# ── Session state init ──
for key, val in [("zip_bytes", None), ("summary", []), ("uploader_key", 0)]:
    if key not in st.session_state:
        st.session_state[key] = val

# ── Main UI ──
files = st.file_uploader(
    "Upload PDF files",
    type="pdf",
    accept_multiple_files=True,
    key=f"uploader_{st.session_state.uploader_key}"
)

if files:
    col_a, col_b, _ = st.columns([1, 1, 3])
    with col_a:
        start_btn = st.button("Start Processing", use_container_width=True)
    with col_b:
        if st.button("Clear All", use_container_width=True):
            st.session_state.uploader_key += 1
            st.session_state.zip_bytes    = None
            st.session_state.summary      = []
            st.experimental_rerun()

    if start_btn:
        summary = []
        zip_buf = io.BytesIO()

        with zipfile.ZipFile(zip_buf, "w", zipfile.ZIP_DEFLATED) as zf:
            for f in files:
                meta = None
                doi  = extract_doi(f)
                if doi:
                    doi_key = doi.lower().strip()
                    if doi_key in st.session_state.doi_cache:
                        meta = st.session_state.doi_cache[doi_key]
                    else:
                        meta = fetch_by_doi(doi_key)
                        if meta:
                            st.session_state.doi_cache[doi_key] = meta

                tc = None
                if not meta:
                    tc = extract_title_candidate(f)
                    if tc:
                        tc_key = tc.lower().strip()
                        if tc_key in st.session_state.title_cache:
                            meta = st.session_state.title_cache[tc_key]
                        else:
                            meta = search_by_title(tc_key)
                            if meta:
                                st.session_state.title_cache[tc_key] = meta

                if meta:
                    key_map = {"Year": meta["year"], "Author": meta["author"],
                               "Title": meta["title"], "Journal": meta["journal"]}
                    parts   = [key_map[s] for s in slots if s != "not_use"]
                    stem    = sanitize("_".join(parts)) if parts else "Unknown_Paper"
                    if len(stem) > 150: stem = stem[:150] + "..."
                    new_name = stem + ".pdf"
                    status   = "Success"
                else:
                    new_name = "ERROR_" + f.name
                    status   = "Error"

                summary.append({
                    "Original": f.name, 
                    "Renamed": new_name, 
                    "Status": status,
                    "Detected DOI": doi if doi else "-",
                    "Title Fallback": tc if tc else "-"
                })
                
                f.seek(0)
                zf.writestr(new_name, f.getvalue())

        st.session_state.zip_bytes = zip_buf.getvalue()
        st.session_state.summary   = summary

    if st.session_state.zip_bytes:
        col_dl, _ = st.columns([2, 3])
        with col_dl:
            st.download_button(
                "Download ZIP of Renamed Papers",
                st.session_state.zip_bytes,
                "renamed_papers.zip",
                use_container_width=True
            )
        st.subheader("Results")
        st.dataframe(st.session_state.summary, use_container_width=True)
`
  }
}, document.getElementById("root"));

const loadingEl = document.getElementById('loading-screen');
const readyObs = new MutationObserver(() => {
  const ready = document.querySelector('[data-testid="stFileUploaderDropzone"], [data-testid="stFileUploader"]');
  if (ready) {
    loadingEl.classList.add('fade-out');
    setTimeout(() => loadingEl.remove(), 600);
    readyObs.disconnect();
  }
});
readyObs.observe(document.getElementById('root'), { childList: true, subtree: true });
</script>
</body>
</html>
